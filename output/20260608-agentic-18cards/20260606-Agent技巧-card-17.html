<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1440px; overflow: hidden; background: #FFFFFF; font-family: 'Inter', sans-serif; color: #111827; }
  .card { width: 1080px; height: 1440px; position: relative; padding: 80px 88px; display: flex; flex-direction: column; }
  .card-number { font-family: 'Playfair Display', Georgia, 'Noto Serif SC', serif; font-size: 120px; font-weight: 700; color: #FF5701; line-height: 1; letter-spacing: -2px; }
  .page-indicator { position: absolute; top: 88px; right: 88px; font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 500; color: #9CA3AF; letter-spacing: 1px; }
  .title { font-family: 'Noto Serif SC', 'Playfair Display', serif; font-size: 88px; font-weight: 900; line-height: 1.2; color: #111827; margin-top: 64px; letter-spacing: -1px; }
  .title-accent { width: 80px; height: 6px; background: #FF5701; margin-top: 40px; border-radius: 3px; }
  .body { font-family: 'Inter', sans-serif; font-size: 38px; font-weight: 400; line-height: 1.75; color: #374151; margin-top: 48px; max-width: 880px; }
  .tip { font-family: 'Inter', sans-serif; font-size: 32px; font-weight: 500; line-height: 1.6; color: #FF5701; margin-top: 56px; padding: 32px 36px; background: #FFF7F2; border-left: 5px solid #FF5701; border-radius: 0 12px 12px 0; max-width: 880px; }
  .bottom-deco { position: absolute; bottom: 0; left: 0; width: 1080px; height: 8px; background: linear-gradient(90deg, #FF5701 0%, #FF5701 33%, #F6F6F1 33%, #F6F6F1 66%, #FF5701 66%, #FF5701 100%); }
  .geo-circle { position: absolute; bottom: 80px; right: 88px; width: 120px; height: 120px; border: 4px solid #F6F6F1; border-radius: 50%; }
  .geo-square { position: absolute; top: 200px; right: 140px; width: 24px; height: 24px; background: #FF5701; opacity: 0.15; transform: rotate(45deg); }
</style>
</head>
<body>
<div class="card">
  <div class="card-number">17</div>
  <div class="page-indicator">17 / 18</div>
  <div class="title">注意平衡别上瘾</div>
  <div class="title-accent"></div>
  <div class="body">Agent是史上最好玩的游戏。朋友里有人沉迷到忘了身边人，上线了却没有用户。问题不是空发布，而是消失在构建中、失去身边的人。学会休息，学会关心人。</div>
  <div class="tip">💡 每周留一天不用Agent，纯手动写代码保持手感</div>
  <div class="geo-circle"></div>
  <div class="geo-square"></div>
  <div class="bottom-deco"></div>
</div>
</body>
</html>
