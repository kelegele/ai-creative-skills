<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card 11</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&family=Inter:wght@400;500&family=Noto+Serif+SC:wght@900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
  }

  .geo-circle {
    position: absolute;
    width: 120px;
    height: 120px;
    border: 3px solid rgba(255, 87, 1, 0.1);
    border-radius: 50%;
    top: 60px;
    right: 60px;
  }

  .geo-square {
    position: absolute;
    width: 80px;
    height: 80px;
    border: 3px solid rgba(255, 87, 1, 0.08);
    border-radius: 4px;
    bottom: 120px;
    left: 60px;
    transform: rotate(15deg);
  }

  .card {
    width: 1080px;
    height: 1440px;
    padding: 80px 80px 60px 80px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
  }

  .card-number { font-family: 'Playfair Display', Georgia, 'Noto Serif SC', serif; font-size: 120px; font-weight: 700; color: #FF5701; line-height: 1; letter-spacing: -2px; }

  .page-indicator {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    color: #9CA3AF;
    align-self: flex-end;
    margin-bottom: 18px;
  }

  .section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .section-upper {
    padding-bottom: 20px;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 56px;
    font-weight: 900;
    color: #111827;
    line-height: 1.3;
    margin-bottom: 16px;
  }

  .title-accent {
    width: 80px;
    height: 6px;
    background: #FF5701;
    margin-bottom: 28px;
    border-radius: 3px;
  }

  .body {
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 400;
    color: #374151;
    line-height: 1.75;
    margin-bottom: 28px;
  }

  .tip {
    font-family: 'Inter', sans-serif;
    font-size: 24px;
    font-weight: 500;
    color: #FF5701;
    background: #FFF7F2;
    border-left: 5px solid #FF5701;
    padding: 16px 24px;
    border-radius: 0 8px 8px 0;
    line-height: 1.6;
  }

  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 30px 0;
    position: relative;
  }

  .divider-line {
    flex: 1;
    height: 3px;
    background: #F6F6F1;
  }

  .divider-dot {
    width: 12px;
    height: 12px;
    background: #FF5701;
    border-radius: 50%;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .section-lower {
    padding-top: 20px;
  }

  .bottom-deco {
    width: 100%;
    height: 6px;
    background: linear-gradient(90deg, #FF5701, #F6F6F1, #FF5701);
    border-radius: 3px;
    margin-top: auto;
  }
</style>
</head>
<body>
  <div class="geo-circle"></div>
  <div class="geo-square"></div>

  <div class="card">
    <div class="card-header">
      <div class="card-number">11</div>
      <div class="page-indicator">11 / 18</div>
    </div>

    <!-- Upper Section -->
    <div class="section section-upper">
      <div class="title">视频也能Agent做</div>
      <div class="title-accent"></div>
      <div class="body">用HTML写视频脚本，Agent直接渲染成MP4。不需要剪辑软件，不需要时间线。做视频的成本降到了一次对话。</div>
      <div class="tip">💡 让Agent把产品介绍写成HTML动画脚本，自动渲染成短视频</div>
    </div>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
    </div>

    <!-- Lower Section -->
    <div class="section section-lower">
      <div class="title">让Agent读取你的大脑</div>
      <div class="title-accent"></div>
      <div class="body">把笔记工具接入Agent——十年的笔记、会议记录、想法，Agent都能读到。每次新会话都站在历史知识的肩膀上，越用越聪明。</div>
      <div class="tip">💡 把你的笔记工具接入Agent，新会话也能继承历史知识</div>
    </div>

    <div class="bottom-deco"></div>
  </div>
</body>
</html>
