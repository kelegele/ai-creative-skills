<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card 13 - 双系统生态 / Agent Cookie同步登录态</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&family=Noto+Serif+SC:wght@900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
  .card {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Geo decorations */
  .geo-circle {
    position: absolute;
    width: 120px;
    height: 120px;
    border: 3px solid #F6F6F1;
    border-radius: 50%;
    top: -30px;
    right: -30px;
    z-index: 0;
  }
  .geo-square {
    position: absolute;
    width: 80px;
    height: 80px;
    border: 3px solid #F6F6F1;
    bottom: -20px;
    left: -20px;
    z-index: 0;
  }

  /* Upper section */
  .upper-section {
    flex: 1;
    padding: 80px 72px 0 72px;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  .card-number { font-family: 'Playfair Display', Georgia, 'Noto Serif SC', serif; font-size: 120px; font-weight: 700; color: #FF5701; line-height: 1; letter-spacing: -2px; }

  .page-indicator {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    color: #9CA3AF;
    margin-top: 8px;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 56px;
    font-weight: 900;
    color: #111827;
    margin-top: 32px;
    line-height: 1.3;
  }

  .title-accent {
    width: 80px;
    height: 6px;
    background: #FF5701;
    margin-top: 16px;
    border-radius: 3px;
  }

  .body {
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 400;
    line-height: 1.75;
    color: #374151;
    margin-top: 28px;
  }

  .tip {
    font-family: 'Inter', sans-serif;
    font-size: 24px;
    font-weight: 500;
    color: #FF5701;
    background: #FFF7F2;
    border-left: 5px solid #FF5701;
    padding: 16px 20px;
    margin-top: 24px;
    line-height: 1.5;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 72px;
    margin: 12px 0;
    position: relative;
    z-index: 1;
  }
  .divider-line {
    flex: 1;
    height: 3px;
    background: #F6F6F1;
  }
  .divider-dot {
    width: 12px;
    height: 12px;
    background: #FF5701;
    border-radius: 50%;
    flex-shrink: 0;
    margin: 0 0;
  }
  .divider-line.right {
    flex: 1;
    height: 3px;
    background: #F6F6F1;
  }

  /* Lower section */
  .lower-section {
    flex: 1;
    padding: 0 72px 0 72px;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  /* Bottom decoration */
  .bottom-deco {
    width: 100%;
    height: 8px;
    background: linear-gradient(90deg, #FF5701 0%, #F6F6F1 50%, #FF5701 100%);
    margin-top: auto;
  }
</style>
</head>
<body>
<div class="card">
  <div class="geo-circle"></div>
  <div class="geo-square"></div>

  <!-- Upper Section -->
  <div class="upper-section">
    <div class="card-number">13</div>
    <div class="page-indicator">13 / 18</div>
    <div class="title">双系统生态</div>
    <div class="title-accent"></div>
    <div class="body">同时跑两个Agent系统——一个擅长自学习越用越好，另一个擅长技能广度。两个系统切换用，互补短板。</div>
    <div class="tip">💡 同时用两个Agent系统，一个主深度一个主广度</div>
  </div>

  <!-- Divider -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line right"></div>
  </div>

  <!-- Lower Section -->
  <div class="lower-section">
    <div class="title">Agent Cookie同步登录态</div>
    <div class="title-accent"></div>
    <div class="body">让Agent以你的身份操作需要登录的网站。同步浏览器cookies，Agent就能帮你下单、查订单、管理后台。</div>
    <div class="tip">💡 让Agent帮你操作需要登录的网站，不用手动输密码</div>
  </div>

  <div class="bottom-deco"></div>
</div>
</body>
</html>
