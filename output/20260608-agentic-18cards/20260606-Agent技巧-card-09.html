<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card 09</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&family=Inter:wght@400;500&family=Noto+Serif+SC:wght@900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Geo decorations */
  .geo-circle {
    position: absolute;
    width: 120px;
    height: 120px;
    border: 3px solid rgba(255, 87, 1, 0.1);
    border-radius: 50%;
    top: 60px;
    right: 60px;
  }

  .geo-square {
    position: absolute;
    width: 80px;
    height: 80px;
    border: 3px solid rgba(255, 87, 1, 0.08);
    border-radius: 4px;
    bottom: 120px;
    left: 60px;
    transform: rotate(15deg);
  }

  .card {
    width: 1080px;
    height: 1440px;
    padding: 80px 80px 60px 80px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Header */
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
  }

  .card-number { font-family: 'Playfair Display', Georgia, 'Noto Serif SC', serif; font-size: 120px; font-weight: 700; color: #FF5701; line-height: 1; letter-spacing: -2px; }

  .page-indicator {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    color: #9CA3AF;
    align-self: flex-end;
    margin-bottom: 18px;
  }

  /* Upper section */
  .section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .section-upper {
    padding-bottom: 20px;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 56px;
    font-weight: 900;
    color: #111827;
    line-height: 1.3;
    margin-bottom: 16px;
  }

  .title-accent {
    width: 80px;
    height: 6px;
    background: #FF5701;
    margin-bottom: 28px;
    border-radius: 3px;
  }

  .body {
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 400;
    color: #374151;
    line-height: 1.75;
    margin-bottom: 28px;
  }

  .tip {
    font-family: 'Inter', sans-serif;
    font-size: 24px;
    font-weight: 500;
    color: #FF5701;
    background: #FFF7F2;
    border-left: 5px solid #FF5701;
    padding: 16px 24px;
    border-radius: 0 8px 8px 0;
    line-height: 1.6;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 30px 0;
    position: relative;
  }

  .divider-line {
    flex: 1;
    height: 3px;
    background: #F6F6F1;
  }

  .divider-dot {
    width: 12px;
    height: 12px;
    background: #FF5701;
    border-radius: 50%;
    margin: 0 0;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  /* Lower section */
  .section-lower {
    padding-top: 20px;
  }

  /* Bottom decoration */
  .bottom-deco {
    width: 100%;
    height: 6px;
    background: linear-gradient(90deg, #FF5701, #F6F6F1, #FF5701);
    border-radius: 3px;
    margin-top: auto;
  }
</style>
</head>
<body>
  <div class="geo-circle"></div>
  <div class="geo-square"></div>

  <div class="card">
    <div class="card-header">
      <div class="card-number">09</div>
      <div class="page-indicator">09 / 18</div>
    </div>

    <!-- Upper Section -->
    <div class="section section-upper">
      <div class="title">last30days调研先行</div>
      <div class="title-accent"></div>
      <div class="body">做决策前先搜近30天社区讨论——Reddit、X、YouTube、HN全部并行搜索。几分钟了解真实用户怎么说，比看过时文档靠谱。</div>
      <div class="tip">💡 选技术栈前，让Agent搜索最近30天社区讨论再拍板</div>
    </div>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
    </div>

    <!-- Lower Section -->
    <div class="section section-lower">
      <div class="title">原始素材胜过摘要</div>
      <div class="title-accent"></div>
      <div class="body">不要自己概括再给Agent。丢完整会议录音、原始报错日志、全部聊天记录。信息越完整，输出越准确。</div>
      <div class="tip">💡 给Agent贴完整报错日志，别只说「它报错了」</div>
    </div>

    <div class="bottom-deco"></div>
  </div>
</body>
</html>
