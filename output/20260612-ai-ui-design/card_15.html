<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1440px; overflow: hidden; background: #FFFFFF; font-family: 'Inter', sans-serif; color: #111827; }
  .card { width: 1080px; height: 1440px; position: relative; overflow: hidden; }
  .deco-number { position: absolute; top: -60px; right: -40px; font-family: 'Playfair Display', serif; font-size: 640px; font-weight: 900; color: #FF5701; opacity: 0.06; line-height: 1; pointer-events: none; user-select: none; }
  .badge { position: absolute; top: 88px; left: 88px; font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: #FFFFFF; background: #FF5701; padding: 10px 24px; border-radius: 6px; letter-spacing: 2px; text-transform: uppercase; }
  .center-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 880px; }
  .main-text { font-family: 'Noto Serif SC', 'Playfair Display', serif; font-size: 80px; font-weight: 900; line-height: 1.3; color: #111827; }
  .sub-text { font-family: 'Inter', sans-serif; font-size: 40px; font-weight: 400; line-height: 1.6; color: #6B7280; margin-top: 48px; }
  .accent-bar { width: 80px; height: 6px; background: #FF5701; margin: 0 auto; margin-top: 40px; border-radius: 3px; }
  .footer { position: absolute; bottom: 120px; left: 88px; right: 88px; display: flex; justify-content: space-between; align-items: center; font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 500; color: #9CA3AF; }
  .bottom-deco { position: absolute; bottom: 0; left: 0; width: 1080px; height: 8px; background: linear-gradient(90deg, #FF5701 0%, #FF5701 33%, #F6F6F1 33%, #F6F6F1 66%, #FF5701 66%, #FF5701 100%); }
</style>
</head>
<body>
<div class="card">
  <div class="deco-number">16</div>
  <div class="badge">实战指南</div>
  <div class="center-content">
    <div class="main-text">从需求到UI到代码<br>AI全包了</div>
    <div class="sub-text">收藏这条，下次做产品直接抄</div>
    <div class="accent-bar"></div>
  </div>
  <div class="footer">
    <span>BY 飞栗</span>
    <span>2026.06</span>
  </div>
  <div class="bottom-deco"></div>
</div>
</body>
</html>
